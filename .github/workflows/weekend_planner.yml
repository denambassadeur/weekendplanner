name: Wekelijkse Weekend Planner

on:
  schedule:
    - cron: '0 8 * * 4'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Geüpdatet van v3 naar v4

    - name: Stel Python in
      uses: actions/setup-python@v5 # Geüpdatet van v4 naar v5
      with:
        python-version: '3.11'

    - name: Installeer afhankelijkheden
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai

    - name: Draai het Planner Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }} # Cruciaal!
      run: python scraper.py

    - name: Update de Website (GitHub Pages)
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add index.html
        git commit -m "Update weekend planning: $(date)" || echo "Geen wijzigingen om te commiten"
        git push
